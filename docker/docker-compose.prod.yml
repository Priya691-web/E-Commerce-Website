version: '3.8'

services:
  # Production backend with health checks
  backend:
    image: fashionstore-backend:latest
    container_name: fashionstore-backend-prod
    restart: unless-stopped
    environment:
      - FASHIONSTORE_PROFILE=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=fashionstore
      - DB_USER=fashionstore
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CSRF_ENABLED=true
      - RATE_LIMIT_ENABLED=true
      - QA_MODE=false
      - LOG_LEVEL=INFO
      - LOG_FORMAT=JSON
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fashionstore-network

  # MySQL with backup support
  mysql:
    image: mysql:8.0
    container_name: fashionstore-mysql-prod
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=fashionstore
      - MYSQL_USER=fashionstore
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - mysql-backup:/backup
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    networks:
      - fashionstore-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: fashionstore-redis-prod
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - fashionstore-network

  # React Admin Frontend
  admin-frontend:
    build:
      context: ../frontend/admin
      dockerfile: Dockerfile
    container_name: fashionstore-admin-prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fashionstore-network

  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: fashionstore-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - admin-frontend
    networks:
      - fashionstore-network


volumes:
  mysql-data:
    driver: local
  mysql-backup:
    driver: local
  redis-data:
    driver: local

networks:
  fashionstore-network:
    driver: bridge
