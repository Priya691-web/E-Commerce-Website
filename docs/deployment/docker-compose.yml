services:
  mysql:
    image: mysql:8.0
    container_name: fashionstore-mysql
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - fashionstore-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fashionstore-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - fashionstore-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: fashionstore-backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-fashionstore}
      DB_USER: ${MYSQL_USER:-fashionstore}
      DB_PASSWORD: ${MYSQL_PASSWORD:-fashionstorepass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CSRF_ENABLED: ${CSRF_ENABLED:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      ENV: production
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:3000}
      CSP_ALLOWED_FRAME_ANCESTORS: ${CSP_ALLOWED_FRAME_ANCESTORS:-http://localhost:8080,http://localhost:3000}
    ports:
      - "8080:8080"
    networks:
      - fashionstore-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/home"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  admin-frontend:
    build:
      context: ../../fashionstore-admin
      dockerfile: Dockerfile
    container_name: fashionstore-admin-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - fashionstore-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  fashionstore-network:
    driver: bridge
