# ============================================================
# DOCKER COMPOSE - PRODUCTION DEPLOYMENT
# ============================================================

version: '3.9'

services:
  # ============================================================
  # NGINX REVERSE PROXY
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: fashionstore-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.production.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    networks:
      - fashionstore-network
    depends_on:
      backend:
        condition: service_healthy
      admin-frontend:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # BACKEND APPLICATION
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        BUILD_DATE: ${BUILD_DATE:?BUILD_DATE must be set}
        VCS_REF: ${VCS_REF:?VCS_REF must be set}
        VERSION: ${VERSION:-latest}
    container_name: fashionstore-backend
    environment:
      # Application
      ENV: production
      NODE_ENV: production
      
      # Database
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: fashionstore_production
      DB_USER: ${DB_USER:-fashionstore}
      DB_PASSWORD: ${DB_PASSWORD:-CHANGE_ME}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://www.fashionstore.com,https://admin.fashionstore.com}
      CSP_ALLOWED_FRAME_ANCESTORS: ${CSP_ALLOWED_FRAME_ANCESTORS:-https://www.fashionstore.com,https://admin.fashionstore.com}
      
      # Security
      CSRF_ENABLED: "true"
      RATE_LIMIT_ENABLED: "true"
      
      # Stripe
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-WARN}
      LOG_FORMAT: JSON
      
      # Session
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-7200}
    volumes:
      - backend-logs:/usr/local/tomcat/logs
    networks:
      - fashionstore-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # ============================================================
  # ADMIN FRONTEND
  # ============================================================
  admin-frontend:
    build:
      context: ./fashionstore-admin
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:?BUILD_DATE must be set}
        VCS_REF: ${VCS_REF:?VCS_REF must be set}
        VERSION: ${VERSION:-latest}
    container_name: fashionstore-admin
    environment:
      VITE_BACKEND_TARGET: http://backend:8080
      VITE_API_BASE: http://backend:8080/api/admin
    networks:
      - fashionstore-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ============================================================
  # MYSQL DATABASE
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: fashionstore-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CHANGE_ME_ROOT_PASSWORD}
      MYSQL_DATABASE: fashionstore_production
      MYSQL_USER: ${DB_USER:-fashionstore}
      MYSQL_PASSWORD: ${DB_PASSWORD:-CHANGE_ME}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - fashionstore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  # ============================================================
  # REDIS CACHE
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: fashionstore-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - fashionstore-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

# ============================================================
# NETWORKS
# ============================================================
networks:
  fashionstore-network:
    driver: bridge
    name: fashionstore-network

# ============================================================
# VOLUMES
# ============================================================
volumes:
  mysql-data:
    name: fashionstore-mysql-data
    driver: local
  redis-data:
    name: fashionstore-redis-data
    driver: local
  nginx-cache:
    name: fashionstore-nginx-cache
    driver: local
  nginx-logs:
    name: fashionstore-nginx-logs
    driver: local
  backend-logs:
    name: fashionstore-backend-logs
    driver: local
